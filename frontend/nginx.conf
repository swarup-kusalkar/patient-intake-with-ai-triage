server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # -----------------------------------------------------------------------
    # Static asset caching — fingerprinted by Vite (content hash in filename)
    # Aggressive caching is safe because filenames change when content changes
    # -----------------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # -----------------------------------------------------------------------
    # API proxy — forward /api/* to the backend service
    # This mirrors the Vite dev proxy so the frontend never needs to know
    # the backend URL directly — always uses relative /api/v1/* paths.
    # -----------------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings for potentially slow LLM calls
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # -----------------------------------------------------------------------
    # SPA fallback — React Router handles all client-side routes
    # Without this, a direct browser navigation to /patients returns 404
    # -----------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
